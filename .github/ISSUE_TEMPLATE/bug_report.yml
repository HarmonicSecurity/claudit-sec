name: Bug Report
description: Report a problem with CLAUDIT
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please redact any sensitive data (tokens, usernames, paths) from your output before posting.

  - type: input
    id: macos-version
    attributes:
      label: macOS Version
      description: "Run: sw_vers -productVersion"
      placeholder: "e.g. 15.4"
    validations:
      required: true

  - type: input
    id: zsh-version
    attributes:
      label: zsh Version
      description: "Run: zsh --version"
      placeholder: "e.g. zsh 5.9"
    validations:
      required: true

  - type: input
    id: jq-version
    attributes:
      label: jq Version
      description: "Run: jq --version"
      placeholder: "e.g. jq-1.7.1"
    validations:
      required: true

  - type: dropdown
    id: output-format
    attributes:
      label: Output Format
      options:
        - Terminal (default)
        - HTML (--html)
        - JSON (--json)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1. Run `./claude_audit.sh ...`
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Relevant output
      description: Paste any relevant terminal output or error messages. **Redact sensitive data.**
      render: shell
